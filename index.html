<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐶🐱🐻 Pixel Animal Run Online</title>

    <link rel="stylesheet" href="style.css">

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- Background -->
    <div class="mountains"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <!-- Lobby -->
    <div id="lobby">

        <h1>🐶🐱🐻 Pixel Animal Run Online</h1>

        <div class="card">

            <input
                type="text"
                id="playerName"
                placeholder="ชื่อผู้เล่น"
                maxlength="20"
            >

            <h3>เลือกสัตว์</h3>

            <div class="animals">

                <button class="animalBtn selected" data-animal="🐶">
                    🐶
                    <span>Dog</span>
                </button>

                <button class="animalBtn" data-animal="🐱">
                    🐱
                    <span>Cat</span>
                </button>

                <button class="animalBtn" data-animal="🐻">
                    🐻
                    <span>Bear</span>
                </button>

            </div>

            <div class="roomArea">

                <button id="createRoomBtn">
                    🎮 Create Room
                </button>

                <input
                    type="text"
                    id="roomInput"
                    placeholder="ROOM CODE"
                >

                <button id="joinRoomBtn">
                    🚪 Join Room
                </button>

            </div>

            <div id="roomInfo"></div>

            <div id="shareBox" class="hidden">

                <label>ลิงก์แชร์ห้อง</label>

                <input
                    type="text"
                    id="shareLink"
                    readonly
                >

                <button id="copyLinkBtn">
                    📋 Copy Link
                </button>

            </div>

        </div>

    </div>

    <!-- Waiting Room -->
    <div id="waitingScreen" class="hidden">

        <h2>⌛ Waiting Players...</h2>

        <div id="roomCodeDisplay"></div>

        <div id="playerList"></div>

        <button id="readyBtn">
            ✅ READY
        </button>

    </div>

    <!-- Countdown -->
    <div id="countdown">
        3
    </div>

    <!-- Game Screen -->
    <div id="gameContainer" class="hidden">

        <div id="topBar">

            <div id="roomLabel">
                Room: ---
            </div>

            <div id="scoreBoard">

                <div>
                    Score:
                    <span id="score">
                        0
                    </span>
                </div>

                <div>
                    Time:
                    <span id="time">
                        0
                    </span>s
                </div>

            </div>

        </div>

        <canvas
            id="gameCanvas"
            width="1200"
            height="500">
        </canvas>

        <div id="mobileJump">
            ⬆️ JUMP
        </div>

    </div>

    <!-- Leaderboard -->
    <div id="leaderboard" class="hidden">

        <div class="leaderboard-card">

            <h2>🏆 GAME RESULT</h2>

            <div id="resultList"></div>

            <button id="playAgainBtn">
                🔄 Play Again
            </button>

        </div>

    </div>

    <!-- Audio -->
    <audio id="jumpSound" preload="auto">
        <source
            src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
            type="audio/ogg">
    </audio>

    <audio id="gameOverSound" preload="auto">
        <source
            src="https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg"
            type="audio/ogg">
    </audio>

    <!-- Loading -->
    <div id="loading">

        <div class="loader"></div>

        <p>Connecting Firebase...</p>

    </div>

    <!-- Footer -->
    <footer>

        <p>
            Pixel Animal Run Online
        </p>

        <p>
            Multiplayer 3 Players • Firebase Realtime Database
        </p>

    </footer>

    <!-- Main Script -->
    <script src="script.js"></script>

</body>
</html>
